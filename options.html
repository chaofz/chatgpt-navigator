<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGPT Navigator — Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Settings</h1>
      <p class="subtitle">ChatGPT Navigator</p>
    </header>

    <main>
      <section class="group">
        <h2 class="group-title">Appearance</h2>
        <div class="row row-stack">
          <div class="row-info">
            <div class="row-label">Theme</div>
            <div class="row-help">Match ChatGPT or pick a fixed mode.</div>
          </div>
          <div class="segmented" role="radiogroup" aria-label="Theme">
            <label>
              <input type="radio" name="themeMode" value="auto" id="themeAuto" checked>
              <span>Auto</span>
            </label>
            <label>
              <input type="radio" name="themeMode" value="light" id="themeLight">
              <span>Light</span>
            </label>
            <label>
              <input type="radio" name="themeMode" value="dark" id="themeDark">
              <span>Dark</span>
            </label>
          </div>
        </div>
      </section>

      <section class="group">
        <h2 class="group-title">Behavior</h2>

        <label class="row row-toggle" for="scrollLockEnabled">
          <div class="row-info">
            <div class="row-label">Lock scroll</div>
            <div class="row-help">Prevent the page from auto-scrolling while ChatGPT replies.</div>
          </div>
          <span class="switch">
            <input type="checkbox" id="scrollLockEnabled" checked>
            <span class="switch-track"></span>
          </span>
        </label>

        <label class="row row-toggle" for="showPinBackButtons">
          <div class="row-info">
            <div class="row-label">Pin &amp; back buttons</div>
            <div class="row-help">Show controls to remember and return to a scroll position.</div>
          </div>
          <span class="switch">
            <input type="checkbox" id="showPinBackButtons">
            <span class="switch-track"></span>
          </span>
        </label>

        <label class="row row-toggle" for="combineQuestionResponse">
          <div class="row-info">
            <div class="row-label">Combine Q &amp; A</div>
            <div class="row-help">Treat each question and its answer as one outline item.</div>
          </div>
          <span class="switch">
            <input type="checkbox" id="combineQuestionResponse">
            <span class="switch-track"></span>
          </span>
        </label>
      </section>

      <section class="group">
        <h2 class="group-title">Outline</h2>
        <div class="row row-stack">
          <div class="row-info">
            <div class="row-label">Show</div>
            <div class="row-help">Limit the outline to the most recent questions.</div>
          </div>
          <div class="segmented" role="radiogroup" aria-label="Outline display">
            <label>
              <input type="radio" name="displayMode" value="all" id="displayAll" checked>
              <span>All</span>
            </label>
            <label>
              <input type="radio" name="displayMode" value="limited" id="displayLimited">
              <span>Limit</span>
            </label>
          </div>
        </div>
        <div class="row row-inline" id="limitControl" hidden>
          <div class="row-info">
            <div class="row-label">Max questions</div>
          </div>
          <input type="number" id="maxQuestions" min="1" max="50" value="10" class="number-input">
        </div>
      </section>

      <footer class="actions">
        <span id="statusMessage" class="status-message" role="status" aria-live="polite"></span>
        <button id="resetButton" class="button">Reset to defaults</button>
      </footer>
    </main>
  </div>
  <script src="options.js"></script>
</body>
</html>
