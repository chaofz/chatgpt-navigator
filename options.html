<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatGPT Navigator — Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Settings</h1>
      <p class="subtitle">ChatGPT Navigator</p>
    </header>

    <main>
      <section class="group">
        <h2 class="group-title">Appearance</h2>
        <div class="row row-stack">
          <div class="row-info">
            <div class="row-label">Theme</div>
            <div class="row-help">Match ChatGPT or pick a fixed mode.</div>
          </div>
          <div class="segmented" role="radiogroup" aria-label="Theme">
            <label>
              <input type="radio" name="themeMode" value="auto" id="themeAuto" checked>
              <span>Auto</span>
            </label>
            <label>
              <input type="radio" name="themeMode" value="light" id="themeLight">
              <span>Light</span>
            </label>
            <label>
              <input type="radio" name="themeMode" value="dark" id="themeDark">
              <span>Dark</span>
            </label>
          </div>
        </div>
      </section>

      <section class="group">
        <h2 class="group-title">Behavior</h2>

        <label class="row row-toggle" for="showScrollLockButton">
          <div class="row-info">
            <div class="row-label">Show lock button</div>
            <div class="row-help">Show a button in the sidebar to toggle scroll lock manually.</div>
          </div>
          <span class="switch">
            <input type="checkbox" id="showScrollLockButton" checked>
            <span class="switch-track"></span>
          </span>
        </label>

        <label class="row row-toggle" for="showPinButton">
          <div class="row-info">
            <div class="row-label">Pin button</div>
            <div class="row-help">Show a button to remember and return to a scroll position.</div>
          </div>
          <span class="switch">
            <input type="checkbox" id="showPinButton" checked>
            <span class="switch-track"></span>
          </span>
        </label>
      </section>

      <section class="group">
        <h2 class="group-title">Outline</h2>

        <label class="row row-toggle" for="showOutline">
          <div class="row-info">
            <div class="row-label">Show Table of Contents</div>
            <div class="row-help">Show the clickable list of conversation messages.</div>
          </div>
          <span class="switch">
            <input type="checkbox" id="showOutline" checked>
            <span class="switch-track"></span>
          </span>
        </label>

        <label class="row row-toggle" for="combineQuestionResponse">
          <div class="row-info">
            <div class="row-label">Combine Q &amp; A</div>
            <div class="row-help">Treat each question and its answer as one outline item.</div>
          </div>
          <span class="switch">
            <input type="checkbox" id="combineQuestionResponse">
            <span class="switch-track"></span>
          </span>
        </label>

        <div class="row">
          <div class="row-info">
            <div class="row-help">Note: ChatGPT already has a built-in outline navigator and partial rendering, so third-party tools may not work perfectly. Use them at your discretion.</div>
          </div>
        </div>
      </section>

      <footer class="actions">
        <span id="statusMessage" class="status-message" role="status" aria-live="polite"></span>
      </footer>
    </main>
  </div>
  <script src="options.js"></script>
</body>
</html>
